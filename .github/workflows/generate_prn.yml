name: Supabase → PRN 파일 생성

on:
  workflow_dispatch:
    inputs:
      station_ids:
        description: '생성할 지점 번호, 쉼표 구분 (예: 216,211,121). 비워두면 전체 95개'
        required: false
        default: ''
      start_year:
        description: '시작 연도 (기본: 1954)'
        required: false
        default: '1954'
      end_year:
        description: '종료 연도 (기본: 현재 연도)'
        required: false
        default: ''

jobs:
  generate:
    name: PRN 생성
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: PRN 파일 생성
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          STATION_IDS:          ${{ github.event.inputs.station_ids || '' }}
          START_YEAR:           ${{ github.event.inputs.start_year  || '1954' }}
          END_YEAR:             ${{ github.event.inputs.end_year    || '' }}
          OUTPUT_DIR:           prn_output
        run: python generate_prn.py

      - name: PRN 파일 업로드 (Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: prn-files
          path: prn_output/*.prn
          retention-days: 30
