name: KMA ASOS → Supabase 동기화

on:
  # 매일 한국시간 자정(UTC 15:00) 자동 실행
  schedule:
    - cron: '0 15 * * *'

  # GitHub 웹 또는 API에서 수동 실행 가능
  workflow_dispatch:
    inputs:
      max_calls:
        description: '최대 KMA API 호출 횟수 (기본: 1000 / 일일 한도: 10000)'
        required: false
        default: '1000'
      start_year:
        description: '동기화 시작 연도 (기본: 2001)'
        required: false
        default: '1954'
      end_year:
        description: '동기화 종료 연도 (비워두면 현재 연도)'
        required: false
        default: ''
      station_ids:
        description: '특정 지점만 처리, 쉼표 구분 (예: 90,95,100). 비워두면 전체 95개 지점'
        required: false
        default: ''

jobs:
  sync:
    name: 기상청 데이터 동기화
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: kma-sync/requirements.txt

      - name: 의존성 설치
        run: pip install -r kma-sync/requirements.txt

      - name: KMA → Supabase 동기화 실행
        env:
          KMA_API_KEY:          ${{ secrets.KMA_API_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          MAX_CALLS:            ${{ github.event.inputs.max_calls    || '1000' }}
          START_YEAR:           ${{ github.event.inputs.start_year   || '2001' }}
          END_YEAR:             ${{ github.event.inputs.end_year     || ''     }}
          STATION_IDS:          ${{ github.event.inputs.station_ids  || ''     }}
        run: python kma-sync/sync_kma.py
