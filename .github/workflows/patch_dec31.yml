name: 12-31 h24 누락 패치

on:
  workflow_dispatch:
    inputs:
      start_year:
        description: '패치 시작 연도 (기본: 1954)'
        required: false
        default: '1954'
      end_year:
        description: '패치 종료 연도 (기본: 전년도)'
        required: false
        default: ''
      max_calls:
        description: '최대 KMA API 호출 횟수 (기본: 5000 / 일일 한도: 10000)'
        required: false
        default: '5000'
      station_ids:
        description: '특정 지점만 처리, 쉼표 구분 (예: 90,95,211). 비워두면 전체 95개 지점'
        required: false
        default: ''

jobs:
  patch:
    name: 12-31 h24 패치
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 12-31 h24 패치 실행
        env:
          KMA_API_KEY:          ${{ secrets.KMA_API_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          START_YEAR:           ${{ github.event.inputs.start_year || '1954' }}
          END_YEAR:             ${{ github.event.inputs.end_year   || ''     }}
          MAX_CALLS:            ${{ github.event.inputs.max_calls  || '5000' }}
          STATION_IDS:          ${{ github.event.inputs.station_ids || ''    }}
        run: python patch_dec31.py
